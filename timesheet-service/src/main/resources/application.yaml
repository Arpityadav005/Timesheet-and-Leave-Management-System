spring:
  application:
    name: timesheet-service
  config:
    import: ${CONFIG_SERVER_IMPORT:optional:configserver:http://config-admin:config%40123@localhost:7777}

server:
  forward-headers-strategy: framework
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api/v1/timesheets/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.tms.ts: DEBUG
