spring:
  application:
    name: api-gateway
  config:
    import: ${CONFIG_SERVER_IMPORT:optional:configserver:http://config-admin:config%40123@localhost:7777}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service
                fallbackUri: forward:/fallback/auth
        - id: timesheet-service
          uri: lb://timesheet-service
          predicates:
            - Path=/api/v1/timesheets/**,/api/v1/projects/**
          filters:
            - name: CircuitBreaker
              args:
                name: timesheet-service
                fallbackUri: forward:/fallback/timesheet
        - id: leave-service
          uri: lb://leave-service
          predicates:
            - Path=/api/v1/leave/**
          filters:
            - name: CircuitBreaker
              args:
                name: leave-service
                fallbackUri: forward:/fallback/leave
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: CircuitBreaker
              args:
                name: admin-service
                fallbackUri: forward:/fallback/admin
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: false

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/v1/auth/api-docs
      - name: Timesheet Service
        url: /api/v1/timesheets/api-docs
      - name: Leave Service
        url: /api/v1/leave/api-docs
      - name: Admin Service
        url: /api/v1/admin/api-docs

logging:
  level:
    com.tms.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
      web:
        exposure:
          include: "*"
