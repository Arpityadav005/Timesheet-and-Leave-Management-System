spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-admin:config%40123@localhost:7777

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.tms.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
      web:
        exposure:
          include: "*"
