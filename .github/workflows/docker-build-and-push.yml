name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            dockerfile: EurekaServer/Dockerfile
            image: tms-eureka-server
          - service: config-server
            dockerfile: Config-Server/Dockerfile
            image: tms-config-server
          - service: auth-service
            dockerfile: auth-service/Dockerfile
            image: tms-auth-service
          - service: timesheet-service
            dockerfile: timesheet-service/Dockerfile
            image: tms-timesheet-service
          - service: leave-service
            dockerfile: leave-service/Dockerfile
            image: tms-leave-service
          - service: admin-service
            dockerfile: admin-service/Dockerfile
            image: tms-admin-service
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            image: tms-api-gateway

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
